# Run with `dart run ffigen --config ffigen.yaml`.
name: OpenDspcBindings
description: |
  Bindings for `src/open_dspc.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: 'lib/bindings/open_dspc_bindings_generated.dart'
headers:
  entry-points:
    - 'src/opendspc.h'
    - 'include/ffi/opendspc_fft.h'
    - 'include/ffi/opendspc_lpc.h'
    - 'include/ffi/opendspc_pitch.h'
    - 'include/ffi/opendspc_filter.h'
    - 'include/ffi/opendspc_polyfit.h'
    - 'include/ffi/opendspc_resample.h'
    - 'include/ffi/opendspc_mel.h'
    - 'include/ffi/opendspc_stft.h'
    - 'include/ffi/opendspc_conv.h'
  include-directives:
    - 'src/opendspc.h'
    - 'include/ffi/opendspc_fft.h'
    - 'include/ffi/opendspc_lpc.h'
    - 'include/ffi/opendspc_pitch.h'
    - 'include/ffi/opendspc_filter.h'
    - 'include/ffi/opendspc_polyfit.h'
    - 'include/ffi/opendspc_resample.h'
    - 'include/ffi/opendspc_mel.h'
    - 'include/ffi/opendspc_stft.h'
    - 'include/ffi/opendspc_conv.h'
ffi-native:
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
comments:
  style: any
  length: full

compiler-opts:
  - "-Isrc"
  - "-Iinclude"
  - "-Iinclude/ffi"
  - "-Isrc/third_party/pffft"
  - "-Isrc/third_party/kissfft"
